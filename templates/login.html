<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Monitoramento VPS</title>
    <style>
        :root {
            --bg: #07090f;
            --panel: rgba(11, 16, 28, 0.85);
            --accent: #3ad5ad;
            --accent-strong: #18a383;
            --text: #f2f7ff;
            --muted: #727b9d;
            --border: rgba(58, 213, 173, 0.25);
            font-family: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top, rgba(58, 213, 173, 0.35), transparent 45%),
                radial-gradient(circle at 20% 20%, rgba(24, 163, 131, 0.35), transparent 35%),
                var(--bg);
            color: var(--text);
            padding: 1.5rem;
        }

        .login-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 1.75rem;
            padding: 2.5rem 2.25rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 30px 60px rgba(5, 6, 15, 0.6);
            backdrop-filter: blur(20px);
        }

        .login-card h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: .25rem;
        }

        .login-card p.sub {
            color: var(--muted);
            font-size: .88rem;
            margin-bottom: 2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: .4rem;
            margin-bottom: 1.1rem;
        }

        label {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
        }

        input {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: .65rem;
            color: var(--text);
            padding: .6rem .85rem;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s;
            width: 100%;
        }

        input:focus {
            border-color: rgba(58, 213, 173, 0.7);
        }

        .error-msg {
            background: rgba(255, 111, 130, 0.1);
            border: 1px solid rgba(255, 111, 130, 0.4);
            border-radius: .65rem;
            color: #ff6f82;
            font-size: .85rem;
            padding: .6rem .9rem;
            margin-bottom: 1.1rem;
        }

        button[type="submit"] {
            width: 100%;
            padding: .7rem;
            background: var(--accent);
            color: #07090f;
            border: none;
            border-radius: .75rem;
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: .5rem;
            transition: background .2s, transform .1s;
        }

        button[type="submit"]:hover {
            background: var(--accent-strong);
        }

        button[type="submit"]:active {
            transform: scale(.98);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Monitoramento VPS</h1>
        <p class="sub">Faça login para continuar</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="field">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" autocomplete="username" autofocus required>
            </div>
            <div class="field">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
